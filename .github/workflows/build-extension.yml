name: Build Edge Extension

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build extension
        run: npm run build

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./edge-extension/manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          cd edge-extension
          zip -r ../bilibili2bangumi-edge-v${{ steps.version.outputs.version }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili2bangumi-edge-extension
          path: bilibili2bangumi-edge-v${{ steps.version.outputs.version }}.zip
