<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilibili2Bangumi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #fb7299, #ff85a2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }
    .title {
      flex: 1;
    }
    .title h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fb7299;
    }
    .title p {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .info-item:last-child {
      border-bottom: none;
    }
    .info-label {
      color: #666;
    }
    .info-value {
      color: #333;
      font-weight: 500;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #fb7299;
      color: white;
    }
    .btn-primary:hover {
      background: #ff85a2;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #666;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: #eee;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #f0f9ff;
      border-radius: 6px;
      font-size: 13px;
      color: #1890ff;
    }
    .status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #52c41a;
      border-radius: 50%;
    }
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
    .footer a {
      color: #fb7299;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📺</div>
    <div class="title">
      <h1>bilibili2bangumi</h1>
      <p>版本 0.4.3</p>
    </div>
  </div>

  <div class="status">
    扩展已启用，在B站视频页面可用
  </div>

  <div class="section">
    <div class="section-title">使用说明</div>
    <div class="info-item">
      <span class="info-label">1. 访问B站视频页面</span>
    </div>
    <div class="info-item">
      <span class="info-label">2. 鼠标悬停右侧悬浮球</span>
    </div>
    <div class="info-item">
      <span class="info-label">3. 点击进行同步操作</span>
    </div>
  </div>

  <button class="btn btn-primary" id="open-settings">打开设置面板</button>
  <button class="btn btn-secondary" id="open-github">访问 GitHub 仓库</button>

  <div class="footer">
    <a href="https://github.com/bilibili2bangumi/bilibili2bangumi" target="_blank">GitHub</a> ·
    <a href="https://next.bgm.tv/demo/access-token" target="_blank">获取 Token</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
