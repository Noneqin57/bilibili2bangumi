<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <canvas id="canvas16" width="16" height="16"></canvas>
  <canvas id="canvas48" width="48" height="48"></canvas>
  <canvas id="canvas128" width="128" height="128"></canvas>
  
  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      
      // 背景
      ctx.fillStyle = '#fb7299';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 1, 0, Math.PI * 2);
      ctx.fill();
      
      // 电视形状
      ctx.fillStyle = 'white';
      const padding = size * 0.2;
      const w = size - padding * 2;
      const h = w * 0.7;
      const x = padding;
      const y = (size - h) / 2;
      const r = size * 0.1;
      
      // 电视主体
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
      
      // 天线
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size * 0.06;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(size * 0.35, y);
      ctx.lineTo(size * 0.25, y - size * 0.15);
      ctx.moveTo(size * 0.65, y);
      ctx.lineTo(size * 0.75, y - size * 0.15);
      ctx.stroke();
      

    }
    
    drawIcon(document.getElementById('canvas16'), 16);
    drawIcon(document.getElementById('canvas48'), 48);
    drawIcon(document.getElementById('canvas128'), 128);
    
    // 输出提示
    console.log('右键点击每个画布，选择"另存为图片"保存为 icon16.png, icon48.png, icon128.png');
  </script>
</body>
</html>
